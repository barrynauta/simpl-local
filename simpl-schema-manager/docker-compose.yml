services:

  fuseki:
    image: secoresearch/fuseki:5.3.0
    container_name: simpl-sm-fuseki
    environment:
      ADMIN_PASSWORD: "${FUSEKI_ADMIN_PASSWORD:-admin1234}"
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    networks:
      - simpl-schema-manager-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030/"]
      interval: 5s
      timeout: 5s
      retries: 12

  kafka:
    image: bitnamilegacy/kafka:3.3.2
    container_name: simpl-sm-kafka
    # SASL_PLAINTEXT with PLAIN mechanism is REQUIRED — the upstream
    # simpl-notification-service ConsumerConfig.class hardcodes
    # security.protocol=SASL_PLAINTEXT and sasl.mechanism=PLAIN
    # (env vars are ignored by that consumer factory). So even though this
    # is a local stack, the broker must speak SASL. Credentials are fake
    # (simpl/simpl-local) — the goal is to satisfy the handshake, not to
    # provide any real security boundary.
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_CONTROLLER_BROKER_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_INTER_BROKER_USER: simpl
      KAFKA_INTER_BROKER_PASSWORD: simpl-local
      KAFKA_CLIENT_USERS: simpl
      KAFKA_CLIENT_PASSWORDS: simpl-local
    ports:
      - "${KAFKA_HOST_PORT:-9094}:9094"
    networks:
      - simpl-schema-manager-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: simpl-sm-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: dev-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="simpl" password="simpl-local";'
    ports:
      - "${KAFKA_UI_PORT:-9001}:8080"
    networks:
      - simpl-schema-manager-net

  schema-manager:
    image: simpl-schema-manager:local
    container_name: simpl-schema-manager
    # Image is built by start.sh using Dockerfile.local (multi-stage Maven + runtime).
    # To rebuild: ./start.sh --rebuild
    depends_on:
      fuseki:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      FUSEKI_BASE_URL: http://fuseki:3030
      ADMIN_USERNAME: "${FUSEKI_ADMIN_USER:-admin}"
      ADMIN_PASSWORD: "${FUSEKI_ADMIN_PASSWORD:-admin1234}"

      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="simpl" password="simpl-local";'

      # Defaults match upstream application.properties; documented here for visibility.
      EMAIL_ADDRESS: simpl123@mailinator.com
      HTTP_NON_PROXY_HOSTS: ""

      SPRING_PROFILES_ACTIVE: default
    ports:
      - "${SCHEMA_MANAGER_PORT:-8085}:8085"
    networks:
      - simpl-schema-manager-net

  schema-manager-ui:
    image: simpl-schema-manager-ui:local
    container_name: simpl-schema-manager-ui
    # Image is built by start.sh using Dockerfile.local-ui — Vite build + an
    # nginx that proxies /v1/* to the backend with auth-header injection.
    # To rebuild: ./start.sh --rebuild
    depends_on:
      schema-manager:
        condition: service_started
    ports:
      - "${UI_PORT:-4322}:8080"
    networks:
      - simpl-schema-manager-net

  # ── Bruno smoke tests ────────────────────────────────────────────────────
  # Opt-in via the "tests" profile. Run with:
  #   ./start.sh --run-tests
  # or directly:
  #   docker compose --profile tests run --rm bruno-smoke-test
  # The container installs @usebruno/cli on first use (one-time ~15s on a
  # warm npm cache, ~60s cold). Subsequent runs reuse the image layer.
  bruno-smoke-test:
    image: node:20-alpine
    container_name: simpl-sm-bruno-tests
    profiles: ["tests"]
    working_dir: /bruno
    volumes:
      - ./bruno:/bruno:ro
    networks:
      - simpl-schema-manager-net
    command: >
      sh -c "
        npm install -g @usebruno/cli --silent 2>/dev/null &&
        echo '' &&
        echo '╔══════════════════════════════════════════════════════╗' &&
        echo '║   Simpl Schema Manager Smoke Tests — Bruno           ║' &&
        echo '╚══════════════════════════════════════════════════════╝' &&
        echo '' &&
        bru run --env docker -r;
        EXIT=$$?;
        echo '';
        if [ $$EXIT -eq 0 ]; then
          echo '╔══════════════════════════════════════════════════════╗';
          echo '║   ✅  All smoke tests passed.                         ║';
          echo '╚══════════════════════════════════════════════════════╝';
        else
          echo '╔══════════════════════════════════════════════════════╗';
          echo '║   ❌  One or more tests failed. See output above.     ║';
          echo '╚══════════════════════════════════════════════════════╝';
        fi;
        exit $$EXIT
      "

networks:
  simpl-schema-manager-net:
    driver: bridge
