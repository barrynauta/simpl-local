# nginx config for the local simpl-schema-manager-ui stack.
#
# Two jobs:
#  1. Serve the Vue SPA static assets at /  (SPA fallback to /index.html).
#  2. Reverse-proxy /v1/*  →  schema-manager:8085/*  with two transforms:
#       - strip the /v1 path prefix the UI expects (production has it; our
#         local backend serves at /).
#       - inject a fake Authorization header. The backend's RoleUtil uses
#         auth0 JWT.decode() which does NOT verify the signature — it only
#         reads the realm_access.roles claim. Any well-formed JWT with the
#         right claim passes. The token below carries GA_SCHEMA_ADMIN.

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log /dev/stdout;
  sendfile   on;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  # File upload limit — matches what a SHACL schema upload might need.
  client_max_body_size 16M;

  # ── Fake Keycloak JWT (header + payload + arbitrary signature) ───────────
  #
  # Payload (base64url-decoded):
  #   {
  #     "sub": "local-dev",
  #     "preferred_username": "local-dev",
  #     "given_name": "Local",
  #     "family_name": "Dev",
  #     "name": "Local Dev",
  #     "email": "local-dev@example.com",
  #     "realm_access": { "roles": ["GA_SCHEMA_ADMIN", "GA_SCHEMA_VIEWER"] }
  #   }
  #
  # The backend uses com.auth0.jwt.JWT.decode() which performs no signature
  # verification, no expiry check, no issuer check. This makes the bypass
  # safe to commit — it works only against the local stack's backend.
  map $http_host $local_fake_jwt {
    default "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJsb2NhbC1kZXYiLCJwcmVmZXJyZWRfdXNlcm5hbWUiOiJsb2NhbC1kZXYiLCJnaXZlbl9uYW1lIjoiTG9jYWwiLCJmYW1pbHlfbmFtZSI6IkRldiIsIm5hbWUiOiJMb2NhbCBEZXYiLCJlbWFpbCI6ImxvY2FsLWRldkBleGFtcGxlLmNvbSIsInJlYWxtX2FjY2VzcyI6eyJyb2xlcyI6WyJHQV9TQ0hFTUFfQURNSU4iLCJHQV9TQ0hFTUFfVklFV0VSIl19fQ.bG9jYWwtc3RhY2stbm8tc2lnbmF0dXJlLXZlcmlmaWNhdGlvbg";
  }

  server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── 1. Reverse proxy to schema-manager backend ─────────────────────────
    # The UI calls /v1/schemas, /v1/webhooks, etc.  Rewrite to /schemas,
    # /webhooks on the backend and inject the fake JWT.
    location /v1/ {
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization     $local_fake_jwt;

      rewrite ^/v1/(.*)$ /$1 break;
      proxy_pass http://schema-manager:8085;
    }

    # ── 2. SPA fallback ────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
