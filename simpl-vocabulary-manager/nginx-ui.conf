# Local-stack nginx config for simpl-vocabulary-manager-ui.
# Replaces /etc/nginx/conf.d/default.conf in nginxinc/nginx-unprivileged.
#
# Two jobs:
#  1. Serve the Vite SPA (history-mode routing → fall back to index.html).
#  2. Reverse-proxy /api/ to the backend container so the browser talks to
#     one origin — the backend has no CORS configuration.
server {
  listen 8080;
  listen [::]:8080;

  location / {
    root  /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # The backend now versions its API under /v1 (Spring path-segment API
    # versioning). The UI (v1.1.0) still requests un-versioned paths, so bridge
    # /api/<x> to the backend's /v1/<x>: e.g. /api/vocabularies → /v1/vocabularies.
    proxy_pass http://vocabulary-manager:8086/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Upload limit headroom above the backend's 6MB multipart cap
    client_max_body_size 10m;
  }
}
