# Local-stack nginx config for simpl-vocabulary-manager-ui.
# Replaces /etc/nginx/conf.d/default.conf in nginxinc/nginx-unprivileged.
#
# Two jobs:
#  1. Serve the Vite SPA (history-mode routing → fall back to index.html).
#  2. Reverse-proxy /api/ to the backend container so the browser talks to
#     one origin — the backend has no CORS configuration.
server {
  listen 8080;
  listen [::]:8080;

  location / {
    root  /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # Trailing slash strips the /api/ prefix: /api/vocabularies → /vocabularies
    proxy_pass http://vocabulary-manager:8086/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Upload limit headroom above the backend's 6MB multipart cap
    client_max_body_size 10m;
  }
}
