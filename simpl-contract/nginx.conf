# nginx config for the local contract-ui stack.
#
# Two jobs:
#  1. Serve the React SPA static assets at /  (SPA fallback to /index.html).
#  2. Reverse-proxy /contract/*  →  contract:8080/contract/*  so that, once the
#     UI gains backend-integration code, requests reach the contract service
#     with no further config. Today the UI makes no such calls (httpClient is
#     unused), so this proxy is dormant-but-ready.
#
# Unlike the schema-manager stack, NO fake-JWT injection is done here: the
# contract backend's auth model for these endpoints isn't wired in the local
# stack and the UI never reaches them, so there's nothing to spoof yet.

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log /dev/stdout;
  sendfile   on;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  client_max_body_size 16M;

  server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── 1. Reverse proxy to the contract backend ───────────────────────────
    # The backend enforces an API key (header X-Api-Key, declared in its
    # OpenAPI ApiKeyAuth scheme). We inject it here so the secret lives in the
    # gateway config, never in the browser bundle — and the SPA calls a plain
    # relative /contract/... URL with no knowledge of the key or the backend
    # host. Value must match the backend's API_KEY env (docker-compose.yml).
    location /contract/ {
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Api-Key         "apikey";
      proxy_pass http://contract:8080;
    }

    # ── 2. SPA fallback ────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
